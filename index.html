<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codelabs | Kartik Arora</title>
  
  <!-- Brand Identity CSS v1.4.0 -->
  <link href="https://distribute.kartikarora.me/css/kartikarora.1.4.0.css" rel="stylesheet">
  
  <!-- Required Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <!-- Brand Interaction JS v1.4.0 -->
  <script src="https://distribute.kartikarora.me/js/kartikarora.1.4.0.js" defer></script>

  <style>
    /* Mandatory Override for Codelabs requirements within 1.4.0 constraints */
    .card-footer .btn {
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- 1. Navigation (Strict 1.4.0 Structure) -->
  <nav class="nav">
    <div class="nav-container">
      <a href="/" class="nav-brand">Kartik Arora</a>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span class="material-symbols-outlined">menu</span>
      </button>

      <ul class="nav-links" id="nav-links">
        <li><a href="https://kartikarora.me/" class="nav-link">Home</a></li>
        <li><a href="https://kartikarora.me/projects" class="nav-link">Projects</a></li>
        <li><a href="https://kartikarora.me/talks" class="nav-link">Talks</a></li>
        <li><a href="https://kartikarora.me/about" class="nav-link">About</a></li>
        <li><a href="/" class="nav-link active">Codelabs</a></li>

        <ul class="nav-social">
          <li>
            <a href="https://linkedin.com/in/arorakartik" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
              <i class="fa-brands fa-linkedin"></i>
            </a>
          </li>
          <li>
            <a href="https://medium.com/@kartikarora" target="_blank" rel="noopener noreferrer" aria-label="Medium">
              <i class="fa-brands fa-medium"></i>
            </a>
          </li>
        </ul>
      </ul>
    </div>
  </nav>

  <!-- 2. Hero Section (Strict 1.4.0 Structure) -->
  <section class="hero">
    <div class="container-narrow">
      <h1 class="hero-title">Codelabs</h1>
      <p class="hero-subtitle">Step-by-step guides to mastering modern technologies.</p>
    </div>
  </section>

  <!-- 3. Projects Section (Strict 1.4.0 Structure) -->
  <section class="section pt-0">
    <div class="container">
      
      <!-- Tabs (Strict 1.4.0 Structure) -->
      <div class="text-center mb-xl">
        <div class="tabs">
          <div class="tab-item active" data-value="all">All</div>
          <div class="tab-item" data-value="android">Android</div>
          <div class="tab-item" data-value="web">Web</div>
          <div class="tab-item" data-value="ai">AI</div>
        </div>
      </div>

      <!-- Grid (Strict 1.4.0 Structure) -->
      <div class="card-grid" id="codelabs-list">
        <!-- Cards injected via JS -->
      </div>
    </div>
  </section>

  <!-- 4. Footer (Strict 1.4.0 Structure) -->
  <footer class="footer">
    <div class="container">
      <ul class="footer-social">
        <li>
          <a href="https://github.com/kartikarora" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fa-brands fa-github"></i>
          </a>
        </li>
        <li>
          <a href="https://linkedin.com/in/arorakartik" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
          </a>
        </li>
      </ul>
      <p>
        Get in touch for help, suggestions, or to <a href="https://www.buymeacoffee.com/kartikarora" target="_blank" rel="noopener noreferrer">buy me a coffee <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 1.2em;">local_cafe</span></a>
      </p>
      <p class="text-muted">
        Made with Jekyll | Hosted on Cloudflare Pages<br>
        &copy; 2026 Kartik Arora
      </p>
    </div>
  </footer>

  <!-- FontAwesome for Social Icons -->
  <script src="https://kit.fontawesome.com/e13d147196.js" crossorigin="anonymous"></script>

  <script>
    // Fetch and render codelabs
    fetch('./codelabs.json')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('codelabs-list');
        
        const renderCodelabs = (filter = 'all') => {
          const filtered = filter === 'all' 
            ? data 
            : data.filter(cl => (cl.category || []).includes(filter));

          if (filtered.length === 0) {
            list.innerHTML = `<p class="text-center text-muted" style="grid-column: 1/-1;">No codelabs found.</p>`;
            return;
          }

          list.innerHTML = filtered.map(cl => {
            // Shorten summary to first sentence
            const summaryMatch = cl.summary.match(/^.*?[.!?](\s|$)/);
            const shortSummary = summaryMatch ? summaryMatch[0] : cl.summary;

            return `
            <div class="card-grid-item">
              <div class="card-image">
                ${cl.image 
                  ? `<img src="${cl.image}" alt="${cl.title}">` 
                  : `<div style="height: 200px; display: flex; align-items: center; justify-content: center; background: var(--bg-alt);"><span class="material-symbols-outlined" style="font-size: 3rem; opacity: 0.2;">menu_book</span></div>`
                }
              </div>
              <div class="card-content">
                <div class="card-header">
                  <h3 class="card-title">${cl.title}</h3>
                  <span class="card-meta">${cl.duration ? cl.duration + 'm' : 'LAB'}</span>
                </div>
                <p class="card-body">${shortSummary}</p>
                <div class="card-tags">
                  ${(cl.tags || []).slice(0, 3).map(tag => `<span class="tech-tag">${tag}</span>`).join('')}
                </div>
                
                <div class="card-footer">
                  <a href="${cl.url}" class="btn btn-primary btn-sm">
                    Start Codelab <span class="material-symbols-outlined">arrow_forward</span>
                  </a>
                </div>
              </div>
            </div>
          `;
          }).join('');
        };

        renderCodelabs();

        // 1.4.0 Tab Event Handling
        const tabs = document.querySelector('.tabs');
        if (tabs) {
          tabs.addEventListener('tabChanged', (e) => {
            renderCodelabs(e.detail.value);
          });
        }
      })
      .catch(err => {
        console.error('Error loading codelabs:', err);
        document.getElementById('codelabs-list').innerHTML = '<p class="text-center text-muted">Error loading codelabs.</p>';
      });
  </script>
</body>
</html>
